<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark tile — readable on both light and dark browser tabs -->
  <rect width="32" height="32" rx="6" fill="#0d0d0d"/>
  <!-- > chevron -->
  <polyline
    points="7,10 14,16 7,22"
    fill="none"
    stroke="#fb923c"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- _ underscore -->
  <line
    x1="17" y1="22" x2="26" y2="22"
    stroke="#fb923c"
    stroke-width="2.4"
    stroke-linecap="round"
  />
</svg>
